version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: backtester-postgres
    environment:
      POSTGRES_DB: backtester
      POSTGRES_USER: backtester
      POSTGRES_PASSWORD: backtester
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backtester -d backtester"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: backtester-app
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/backtester
      DATABASE_USER: backtester
      DATABASE_PASSWORD: backtester
    restart: on-failure

volumes:
  postgres_data:
